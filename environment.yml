name: alchemy_modern
channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - defaults
dependencies:
  # === Python ===
  - python=3.9
  
  # === PyTorch core (CUDA 12.4) ===
  - pytorch=2.4.0
  - pytorch-cuda=12.4
  - torchvision=0.19.0
  - torchaudio=2.4.0
  
  # === PyTorch Geometric ===
  - pyg=2.5.3
  - pytorch-scatter
  - pytorch-sparse
  - pytorch-cluster
  
  # === Chemistry ===
  - rdkit=2024.03.1
  - networkx>=2.6
  
  # === Data & Logging ===
  - pandas>=2.0
  - numpy>=1.24
  - tensorboard>=2.14
  - matplotlib>=3.7
  - tqdm>=4.65
  
  # === Utilities ===
  - scikit-learn>=1.3
  - pip
  
  # === Pip-only packages ===
  - pip:
    - torch-geometric>=2.5.0
